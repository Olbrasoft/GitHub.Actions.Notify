name: 'Notify Claude Code via Channel'
description: 'Send CI/CD event to Claude Code Channel MCP server. Fails silently if Channel server is not running.'

inputs:
  port:
    description: 'Channel MCP server port for this project (from central registry)'
    required: true
  event:
    description: 'Event type (e.g., ci-complete, deploy-complete, verify-complete)'
    required: false
    default: 'deploy-complete'
  status:
    description: 'Job status (success/failure/cancelled)'
    required: true
  repository:
    description: 'Repository name (owner/repo)'
    required: true
  commit:
    description: 'Commit SHA'
    required: false
    default: ''
  commit-message:
    description: 'Commit message'
    required: false
    default: ''
  run-url:
    description: 'GitHub Actions run URL'
    required: false
    default: ''
  issue-ids:
    description: 'Comma-separated GitHub issue IDs (e.g., "123,456")'
    required: false
    default: ''
  environment:
    description: 'Deployment environment'
    required: false
    default: 'production'

runs:
  using: composite
  steps:
    - name: Send event to Claude Code Channel
      shell: bash
      run: |
        COMMIT="${{ inputs.commit }}"
        if [ -z "$COMMIT" ]; then
          COMMIT="${GITHUB_SHA:0:7}"
        fi

        COMMIT_MSG="${{ inputs.commit-message }}"
        if [ -z "$COMMIT_MSG" ]; then
          COMMIT_MSG=$(git log -1 --pretty=%s 2>/dev/null || echo "unknown")
        fi

        RUN_URL="${{ inputs.run-url }}"
        if [ -z "$RUN_URL" ]; then
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        fi

        ISSUE_IDS_JSON="[]"
        if [ -n "${{ inputs.issue-ids }}" ]; then
          ISSUE_IDS_JSON="[${{ inputs.issue-ids }}]"
        fi

        RESPONSE=$(curl -s -w "\n%{http_code}" --connect-timeout 2 --max-time 5 \
          -X POST "http://127.0.0.1:${{ inputs.port }}" \
          -H "Content-Type: application/json" \
          -d "{
            \"event\": \"${{ inputs.event }}\",
            \"status\": \"${{ inputs.status }}\",
            \"repository\": \"${{ inputs.repository }}\",
            \"commit\": \"${COMMIT}\",
            \"commitMessage\": $(echo "${COMMIT_MSG}" | jq -Rs .),
            \"runUrl\": \"${RUN_URL}\",
            \"issueIds\": ${ISSUE_IDS_JSON},
            \"environment\": \"${{ inputs.environment }}\"
          }" 2>&1) || true

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)

        if [ "$HTTP_CODE" = "200" ]; then
          echo "::notice::Channel notification sent to Claude Code (port ${{ inputs.port }})"
        elif echo "$RESPONSE" | grep -qi "connection refused\|connect to host"; then
          echo "::notice::Channel notification skipped — Claude Code not running for this project (port ${{ inputs.port }})"
        else
          echo "::warning::Channel notification failed (HTTP ${HTTP_CODE}) on port ${{ inputs.port }}"
        fi
